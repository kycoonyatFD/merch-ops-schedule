<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MerchOps Schedule — July 2026</title>
<style>
:root{
  --navy:#0d1117;--navy2:#161b22;--navy3:#21262d;
  --blue:#58a6ff;--blue-light:#1f3a5f;
  --gold:#f5a623;--gold-light:#3a2a00;
  --green:#22c55e;--green-light:#0d2818;
  --red:#f85149;--surface:#0d1117;--card:#161b22;
  --border:#30363d;--text:#e6edf3;--text-muted:#8b949e;
  --radius:10px;--shadow:0 2px 10px rgba(0,0,0,.4);--shadow-lg:0 6px 24px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--surface);color:var(--text);font-size:13px}
.top-bar{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.top-bar-title{font-size:1rem;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:10px}
.top-bar-title span{opacity:.5;font-weight:400;font-size:.8rem}
.top-bar-right{display:flex;align-items:center;gap:12px}
.today-pill{background:var(--gold);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;cursor:pointer;border:none;white-space:nowrap}
.today-pill:hover{background:#e69500}
.dashboard{display:grid;grid-template-columns:1fr 340px;gap:16px;padding:16px 20px;background:var(--navy);border-bottom:1px solid rgba(255,255,255,.07)}
.active-panel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:14px 16px}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.panel-title{color:#fff;font-weight:700;font-size:.85rem;letter-spacing:.5px;text-transform:uppercase;opacity:.7}
.date-nav{display:flex;align-items:center;gap:8px}
.date-nav-btn{background:rgba(255,255,255,.1);border:none;color:#fff;width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.date-nav-btn:hover{background:rgba(255,255,255,.2)}
.date-display{color:#fff;font-weight:700;font-size:.95rem;min-width:130px;text-align:center}
.date-display small{display:block;font-size:.7rem;font-weight:400;opacity:.6}
.active-badge{background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.shift-groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.shift-group{background:rgba(255,255,255,.04);border-radius:8px;padding:8px 10px;border-left:3px solid transparent}
.shift-group.early{border-left-color:#4dbd7a}
.shift-group.mid{border-left-color:#5b9bd5}
.shift-group.late{border-left-color:#f0c040}
.shift-group.overnight{border-left-color:#a78bfa}
.shift-group.whos-live{border-left-color:#22c55e;background:rgba(34,197,94,.06)}
.shift-group.whos-upcoming{border-left-color:#f5a623;background:rgba(245,166,35,.04)}
.shift-group.whos-later{border-left-color:#3b82f6;background:rgba(59,130,246,.04)}
.shift-group.whos-done{border-left-color:#444c56;background:rgba(255,255,255,.02)}
.whos-done .member-name{color:rgba(255,255,255,.45)}
.whos-done .member-time{color:rgba(255,255,255,.3)}
.shift-group-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;opacity:.5;color:#fff;margin-bottom:5px}
.member-chip{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);gap:6px}
.member-chip:last-child{border-bottom:none}
.member-chip.chip-done{opacity:.38}
.member-name{color:#fff;font-weight:600;font-size:12px}
.member-time{color:rgba(255,255,255,.7);font-size:11px;font-weight:500;white-space:nowrap}
.no-active{color:rgba(255,255,255,.4);font-size:.85rem;padding:16px 0;text-align:center}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-right:2px}
.sdot.live{background:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,.25);animation:livepulse 1.4s ease-in-out infinite}
.sdot.upcoming{background:#f5a623}
.sdot.later{background:#3b82f6;opacity:.7}
.sdot.done{background:#444c56}
.events-panel{display:flex;flex-direction:column;gap:8px}
.events-panel-title{color:#fff;font-weight:700;font-size:.85rem;letter-spacing:.5px;text-transform:uppercase;opacity:.7;margin-bottom:2px}
.event-cards-scroll{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;padding-right:4px}
.event-cards-scroll::-webkit-scrollbar{width:3px}
.event-cards-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
.event-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:10px;transition:background .15s;cursor:pointer}
.event-card:hover{background:rgba(255,255,255,.1)}
.event-card.today-card{background:rgba(245,166,35,.15);border-color:rgba(245,166,35,.4)}
.event-date-badge{text-align:center;min-width:38px}
.event-date-badge .eday{font-size:10px;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase}
.event-date-badge .edate{font-size:1.1rem;font-weight:800;color:#fff;line-height:1}
.event-info{flex:1;min-width:0}
.event-name{color:#fff;font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.matchup-line{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px;font-weight:500}
.ifnec-tag{display:inline-block;font-size:9px;font-weight:700;color:#f5a623;border:1px solid rgba(245,166,35,.5);padding:1px 5px;border-radius:4px;margin-top:2px;letter-spacing:.3px}
.controls-bar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:52px;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.btn-sm{padding:5px 12px;border-radius:7px;border:1.5px solid var(--border);background:var(--navy3);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.btn-sm:hover{border-color:var(--blue);color:var(--blue)}
.btn-sm.active{background:var(--blue);color:#0d1117;border-color:var(--blue)}
.sep{width:1px;height:22px;background:var(--border)}
.search-box{padding:5px 10px;border-radius:7px;border:1.5px solid var(--border);background:var(--navy3);font-size:12px;color:var(--text);outline:none;width:160px}
.search-box:focus{border-color:var(--blue)}
.hidden-count{font-size:11px;color:var(--text-muted);margin-left:2px}
.dropdown-wrap{position:relative}
.dropdown-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:240px;z-index:300;overflow:hidden}
.dropdown-menu.open{display:block}
.dropdown-top{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px}
.dropdown-quick{font-size:11px;font-weight:600;color:var(--blue);cursor:pointer;padding:2px 6px;border-radius:5px;border:1px solid var(--blue);background:none}
.dropdown-quick:hover{background:var(--blue-light)}
.dropdown-search{width:100%;padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;margin-top:6px;outline:none;background:var(--navy3);color:var(--text)}
.dropdown-search:focus{border-color:var(--blue)}
.dropdown-group-label{padding:6px 12px 2px;font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted)}
.dropdown-list{max-height:280px;overflow-y:auto;padding-bottom:6px}
.dropdown-item{display:flex;align-items:center;gap:8px;padding:5px 12px;cursor:pointer;transition:background .1s}
.dropdown-item:hover{background:rgba(255,255,255,.06)}
.dropdown-item input[type=checkbox]{accent-color:var(--blue);width:13px;height:13px;cursor:pointer}
.dropdown-item label{font-size:12px;cursor:pointer;flex:1}
.dropdown-item .dtz{font-size:10px;color:var(--text-muted)}
.table-wrapper{overflow-x:auto;padding-bottom:24px}
.table-wrapper::-webkit-scrollbar{height:6px}
.table-wrapper::-webkit-scrollbar-track{background:var(--navy2)}
.table-wrapper::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
table{border-collapse:collapse;min-width:max-content;font-size:12px}
th,td{border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.col-name{position:sticky;left:0;z-index:10;background:var(--navy);color:#fff;font-weight:600;width:160px;min-width:160px;max-width:160px;padding:0 12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
.emp-title{font-size:9px;color:rgba(255,255,255,.28);font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.1px;margin-top:1px;line-height:1.2}
.col-tz{position:sticky;left:160px;z-index:10;background:var(--navy2);color:rgba(255,255,255,.6);font-size:11px;width:68px;min-width:68px;max-width:68px;text-align:center;padding:0 6px}
.week-hdr{background:var(--navy);color:rgba(255,255,255,.5);text-align:center;font-size:10px;font-weight:700;letter-spacing:.6px;padding:4px 0;border-right:2px solid rgba(255,255,255,.1) !important}
.week-hdr.current-week{color:var(--gold);border-bottom:2px solid var(--gold) !important}
.date-hdr{background:var(--navy2);color:rgba(255,255,255,.85);text-align:center;padding:7px 4px;font-size:11.5px;font-weight:600;cursor:pointer;width:92px;min-width:92px;max-width:92px;transition:background .15s;position:relative}
.date-hdr:hover{background:#1c3d6e}
.date-hdr .dname{font-size:9px;font-weight:500;opacity:.5;display:block;margin-bottom:1px;text-transform:uppercase;letter-spacing:.3px}
.date-hdr .dnum{display:block}
.date-hdr.today{background:var(--gold) !important;color:#fff}
.date-hdr.today .dname{opacity:.8}
.date-hdr.weekend{background:#0f2340}
.date-hdr.has-note::after{content:'📝';font-size:8px;position:absolute;bottom:2px;right:4px}
.date-hdr.week-start{border-left:2px solid rgba(255,255,255,.12) !important}
.section-row td{background:#1c2128;color:rgba(255,255,255,.5);font-weight:700;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-bottom:1px solid var(--border)}
.section-row td.col-name{background:var(--navy2);color:rgba(255,255,255,.4)}
.section-row td.col-tz{background:#1c2128}
.sc{text-align:center;padding:0;height:38px;cursor:pointer;transition:filter .12s,box-shadow .12s;position:relative;width:92px;min-width:92px;max-width:92px}
.sc:hover{filter:brightness(.86);z-index:1;box-shadow:inset 0 0 0 2px rgba(0,0,0,.15)}
.sc .sv{display:flex;align-items:center;justify-content:center;height:100%;font-size:12px;font-weight:600;padding:0 4px;white-space:nowrap;letter-spacing:.1px}
.sc.g3 .sv{font-size:10.5px;letter-spacing:0}
.sc.today{outline:2.5px solid var(--gold);outline-offset:-2px;z-index:2}
.sc.week-start{border-left:2px solid var(--border) !important}
.sc .note-dot{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:#e85d04}
.s-early{background:#0d2818}.s-early .sv{color:#4ade80}
.s-mid{background:#0c1e35}.s-mid .sv{color:#60a5fa}
.s-late{background:#2a1e00}.s-late .sv{color:#fbbf24}
.s-overnight{background:#1e0d35}.s-overnight .sv{color:#c084fc}
.s-off{background:#161b22}.s-off .sv{color:#3d444d;font-size:13px}
.s-holiday{background:#1e0d3a}.s-holiday .sv{color:#a78bfa;font-weight:700}
.s-jury{background:#2a1a00}.s-jury .sv{color:#fb923c;font-weight:700}
.s-blank{background:#0d1117}.s-blank .sv{color:transparent}
.events-row td{padding:5px 7px;font-size:11px;min-width:92px;max-width:92px;white-space:normal;line-height:1.4;vertical-align:top}
.events-row .col-name{font-size:10px;color:rgba(255,255,255,.7);font-weight:700;padding:0 12px;display:flex;align-items:center;height:100%}
.events-row .col-tz{font-size:9px;color:rgba(255,255,255,.4);padding:0 4px;display:flex;align-items:center;justify-content:center}
.ev-events{background:#1e1600;color:#d97706;border-top:2px solid #f5a623}
.ev-notes{background:#0c1e35;color:#60a5fa;border-top:2px solid #3b82f6}
.ev-flags{background:#1e0a0a;color:#f87171;border-top:2px solid #ef4444}
.ev-team{background:#0a1e12;color:#4ade80;cursor:pointer;border-top:2px solid #22c55e;transition:background .15s}
.ev-team:hover{background:#0d2818}
.ev-team.empty-note{color:var(--text-muted);font-style:italic;font-size:10px}
.ev-team.week-start{border-left:2px solid rgba(255,255,255,.06) !important}
.emp-row.hidden-row{display:none}
.emp-row:hover .sc:not(.today){filter:brightness(1.15)}
.emp-row:hover .col-name{background:#1c2128 !important}
.predicts-row:hover .col-name{background:#0d2818 !important}
.live-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(26,158,92,.25);border:1px solid rgba(26,158,92,.5);color:#4dbd7a;font-size:10px;font-weight:800;letter-spacing:.8px;padding:3px 8px;border-radius:20px;text-transform:uppercase}
.live-badge::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:#4dbd7a;animation:livepulse 1.4s ease-in-out infinite}
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.back-today-btn{background:rgba(245,166,35,.2);border:1px solid rgba(245,166,35,.45);color:#f5a623;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;cursor:pointer;transition:background .15s;white-space:nowrap}
.back-today-btn:hover{background:rgba(245,166,35,.35)}
.ev-logo{height:20px;width:auto;vertical-align:middle;object-fit:contain;border-radius:3px}
.ev-logo-wrap{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.spec-star{color:#f5e642;font-size:10px;margin-left:1px;filter:drop-shadow(0 0 2px rgba(245,230,66,.6))}
.sc.sc-specials .sv{flex-direction:column;gap:1px;line-height:1.1;white-space:normal;padding:2px 3px}
.sc-time{font-size:11.5px;font-weight:700;display:block;white-space:nowrap}
.sc-spec{font-size:9px;font-weight:700;opacity:.72;display:block;letter-spacing:.2px}
.legend-bar{background:var(--card);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:11.5px;color:var(--text-muted)}
.leg{display:flex;align-items:center;gap:5px}
.leg-sw{width:16px;height:12px;border-radius:3px;border:1px solid rgba(255,255,255,.1);flex-shrink:0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;width:380px;box-shadow:var(--shadow-lg)}
.modal-title{font-size:1rem;font-weight:700;color:#fff;margin-bottom:4px}
.modal-sub{font-size:.8rem;color:var(--text-muted);margin-bottom:14px}
.modal textarea{width:100%;min-height:90px;background:var(--navy3);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:10px;resize:vertical;outline:none;font-family:inherit}
.modal textarea:focus{border-color:var(--blue)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.mbtn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.mbtn-primary{background:var(--blue);color:#0d1117}
.mbtn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.mbtn-danger{background:transparent;border:1.5px solid var(--red);color:var(--red)}
.mbtn-danger:hover{background:rgba(248,81,73,.15)}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-title">
    MerchOps Schedule
    <span>July 2026</span>
  </div>
  <div class="top-bar-right">
    <span id="live-clock" style="font-size:11px;color:rgba(255,255,255,.5)"></span>
    <button class="today-pill" onclick="jumpToToday()">📍 Today</button>
  </div>
</div>

<div class="dashboard">
  <div class="active-panel">
    <div class="panel-header">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="panel-title">Who's On</div>
        <div id="live-indicator"></div>
      </div>
      <div class="date-nav">
        <button class="date-nav-btn" onclick="navDay(-1)">&#8249;</button>
        <div class="date-display" id="active-date-display"></div>
        <button class="date-nav-btn" onclick="navDay(1)">&#8250;</button>
        <span class="active-badge" id="active-count">0 on</span>
      </div>
    </div>
    <div class="shift-groups" id="active-members-grid"></div>
  </div>
  <div class="events-panel">
    <div class="events-panel-title">&#127942; Upcoming Events</div>
    <div class="event-cards-scroll" id="upcoming-cards"></div>
  </div>
</div>

<div class="controls-bar">
  <div class="filter-group">
    <div class="dropdown-wrap" id="name-dropdown-wrap">
      <button class="btn-sm" onclick="toggleNameDropdown()" id="name-filter-btn">
        &#128100; All Members <span class="hidden-count" id="hidden-count-label"></span> &#9660;
      </button>
      <div class="dropdown-menu" id="name-dropdown">
        <div class="dropdown-top">
          <button class="dropdown-quick" onclick="selectAllNames()">All</button>
          <button class="dropdown-quick" onclick="selectNoneNames()">None</button>
          <button class="dropdown-quick" onclick="selectGroup(1)">SBK</button>
          <button class="dropdown-quick" onclick="selectGroup(2)">FlyWheelOps</button>
          <button class="dropdown-quick" onclick="selectGroup(3)">Racing</button>
        </div>
        <div style="padding:6px 10px 0">
          <input type="text" class="dropdown-search" id="name-search" placeholder="Search names&hellip;" oninput="filterDropdownList()" />
        </div>
        <div class="dropdown-list" id="dropdown-list"></div>
      </div>
    </div>
  </div>
  <div class="sep"></div>
  <div class="filter-group">
    <span class="filter-label">Group:</span>
    <button class="btn-sm active" id="btn-g1" onclick="toggleGroup(1)">SBK</button>
    <button class="btn-sm active" id="btn-g2" onclick="toggleGroup(2)">FlyWheelOps</button>
    <button class="btn-sm active" id="btn-g3" onclick="toggleGroup(3)">Racing Ops</button>
  </div>
  <div class="sep"></div>
  <input class="search-box" type="text" placeholder="&#128269; Search name&hellip;" oninput="searchName(this.value)" />
  <div style="margin-left:auto;font-size:11px;color:var(--text-muted)">Click any date or cell to add notes &nbsp;&middot;&nbsp; <span style="color:#e85d04">&#9679;</span> = note added</div>
</div>

<div class="table-wrapper" id="table-wrap">
  <table id="sched"></table>
</div>

<div class="legend-bar">
  <strong style="margin-right:4px;font-size:11.5px">Shifts:</strong>
  <div class="leg"><div class="leg-sw s-early" style="border:none"></div>Early 5&ndash;6 AM</div>
  <div class="leg"><div class="leg-sw s-mid" style="border:none"></div>Mid 9&ndash;11 AM</div>
  <div class="leg"><div class="leg-sw s-late" style="border:none"></div>Late 1&ndash;2 PM</div>
  <div class="leg"><div class="leg-sw s-overnight" style="border:none"></div>Overnight 7 PM+</div>
  <div class="leg"><div class="leg-sw s-holiday" style="border:none"></div>Holiday</div>
  <div class="leg"><div class="leg-sw" style="background:#0d5c2e;border:none"></div>Predicts</div>
  <div class="leg"><div class="leg-sw" style="background:var(--gold)"></div>Today</div>
  <div style="width:1px;height:18px;background:var(--border);margin:0 4px"></div>
  <div class="leg"><span style="color:#f5e642;font-size:14px;line-height:1">&#9733;</span>&nbsp;<strong>= Specials</strong></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="m-title">Add Note</div>
    <div class="modal-sub" id="m-sub"></div>
    <textarea id="m-input" placeholder="Type your note here&hellip;"></textarea>
    <div class="modal-footer">
      <button class="mbtn mbtn-danger" onclick="clearNote()">Clear</button>
      <button class="mbtn mbtn-ghost" onclick="closeModal()">Cancel</button>
      <button class="mbtn mbtn-primary" onclick="saveNote()">Save Note</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════ DATA ═══════════════ */

/* ═══════════════ UTILS ═══════════════ */
function shiftClass(name,shift){
  const s=(shift||'').trim().toUpperCase();
  if(!s) return 's-blank';
  if(s==='OFF') return 's-off';
  if(s==='HOLIDAY') return 's-holiday';
  if(s==='JURY DUTY') return 's-jury';
  const sl=(shift||'').toLowerCase();
  if(sl.startsWith('5 am')||sl.startsWith('6 am')) return 's-early';
  if(sl.startsWith('8')||sl.startsWith('9 am')||sl.startsWith('10 am')||sl.startsWith('11 am')) return 's-mid';
  if(sl.startsWith('7 pm')||sl.startsWith('8 pm')) return 's-overnight';
  return 's-late';
}
function shiftGroup(name,shift){
  const c=shiftClass(name,shift);
  if(c==='s-early') return 'early';
  if(c==='s-mid') return 'mid';
  if(c==='s-late') return 'late';
  if(c==='s-overnight') return 'overnight';
  return null;
}
function isActive(shift){
  const s=(shift||'').trim().toUpperCase();
  return s && s!=='OFF' && s!=='';
}
// Abbreviate long shift strings for G3 cells: "8:30 AM - 6:30 PM" -> "8:30a-6:30p"
function abbrevShift(shift){
  return shift.replace(/(\d+(?::\d+)?)\s*(AM|PM)/gi,(_,t,ap)=>{
    const time=t.replace(/:00$/,'');
    return time+ap.charAt(0).toLowerCase();
  }).replace(/\s*-\s*/g,'-');
}

/* ═══════════════ LIVE TIME ═══════════════ */
function getCurrentETMinutes(){
  const now=new Date();
  let m=(now.getUTCHours()-4)*60+now.getUTCMinutes();
  if(m<0) m+=1440;
  return m;
}
function parseShiftWindow(shift){
  if(!shift) return null;
  const s=shift.trim().toUpperCase();
  if(!s||s==='OFF'||s==='HOLIDAY'||s==='ON CALL'||s==='JURY DUTY') return null;
  const m=s.match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)\s*[-–]\s*(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/);
  if(!m) return null;
  let sh=parseInt(m[1]),sm=parseInt(m[2]||0),sap=m[3];
  let eh=parseInt(m[4]),em=parseInt(m[5]||0),eap=m[6];
  if(sap==='PM'&&sh!==12) sh+=12;
  if(sap==='AM'&&sh===12) sh=0;
  if(eap==='PM'&&eh!==12) eh+=12;
  if(eap==='AM'&&eh===12) eh=0;
  let start=sh*60+sm, end=eh*60+em;
  if(end<=start) end+=1440;
  return {start,end};
}

function renderDashboard(){
  const i=selectedDay;
  const dt=DATES[i];
  const liveIdx=findTodayIndex();
  const isToday=i===liveIdx;
  document.getElementById('active-date-display').innerHTML=`<small>${dt.dy}${isToday?' · TODAY':''}</small>${dt.d}`;
  const liveEl=document.getElementById('live-indicator');
  if(isAutoTracking&&isToday){
    liveEl.innerHTML='<span class="live-badge">&#9679; LIVE</span>';
  } else {
    liveEl.innerHTML='<button class="back-today-btn" onclick="jumpToToday()">&#8617; Back to Today</button>';
  }
  const nowMins=getCurrentETMinutes();
  const buckets={live:[],upcoming:[],later:[],done:[],other:[]};
  ALL_EMP.forEach(e=>{
    const shift=(e.s[i]||'').trim();
    if(!isActive(shift)) return;
    const win=parseShiftWindow(shift);
    const entry={name:e.n,tz:e.tz,shift,mTitle:TITLES[e.n]||'',isPred:PREDICTS.includes(e.n),win};
    if(!isToday||!win){ buckets.other.push(entry); return; }
    const minsUntil=win.start-nowMins;
    if(nowMins>=win.start&&nowMins<win.end) buckets.live.push(entry);
    else if(minsUntil>0&&minsUntil<=180) buckets.upcoming.push(entry);
    else if(minsUntil>180) buckets.later.push(entry);
    else buckets.done.push(entry);
  });
  const total=buckets.live.length+buckets.upcoming.length+buckets.later.length+buckets.done.length+buckets.other.length;
  document.getElementById('active-count').textContent=`${total} on`;

  function chip(m,dotCls){
    return `<div class="member-chip${dotCls==='done'?' chip-done':''}">
      <span class="sdot ${dotCls}"></span>
      <span class="member-name" style="display:flex;flex-direction:column;gap:0;flex:1;min-width:0">
        <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name}</span>
        ${m.mTitle?`<span style="font-size:9px;color:rgba(255,255,255,.28);font-weight:400">${m.mTitle}</span>`:''}
      </span>
      <span class="member-time">${m.shift}</span>
    </div>`;
  }

  let html='';
  if(isToday){
    if(buckets.live.length){
      html+=`<div class="shift-group whos-live"><div class="shift-group-label">&#128994; Live Now (${buckets.live.length})</div>`;
      buckets.live.forEach(m=>{ html+=chip(m,'live'); }); html+='</div>';
    }
    if(buckets.upcoming.length){
      html+=`<div class="shift-group whos-upcoming"><div class="shift-group-label">&#128993; Starting Soon (${buckets.upcoming.length})</div>`;
      buckets.upcoming.forEach(m=>{
        const away=m.win.start-nowMins;
        const ts=away>=60?`in ${Math.floor(away/60)}h ${away%60}m`:`in ${away}m`;
        html+=`<div class="member-chip"><span class="sdot upcoming"></span>
          <span class="member-name" style="display:flex;flex-direction:column;gap:0;flex:1;min-width:0">
            <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name}</span>
            ${m.mTitle?`<span style="font-size:9px;color:rgba(255,255,255,.28);font-weight:400">${m.mTitle}</span>`:''}
          </span>
          <span class="member-time" style="text-align:right"><span style="display:block">${m.shift}</span><span style="font-size:9px;color:#f5a623;opacity:.8">${ts}</span></span>
        </div>`;
      }); html+='</div>';
    }
    if(buckets.later.length){
      html+=`<div class="shift-group whos-later"><div class="shift-group-label">&#128309; Later Today (${buckets.later.length})</div>`;
      buckets.later.forEach(m=>{ html+=chip(m,'later'); }); html+='</div>';
    }
    if(buckets.done.length){
      html+=`<div class="shift-group whos-done"><div class="shift-group-label">&#10003; Done Today (${buckets.done.length})</div>`;
      buckets.done.forEach(m=>{ html+=chip(m,'done'); }); html+='</div>';
    }
    if(!total) html='<div class="no-active" style="grid-column:1/-1">No scheduled shifts &#127881;</div>';
  } else {
    const tg={early:[],mid:[],late:[],overnight:[]};
    buckets.other.forEach(m=>{ const g=shiftGroup(m.name,m.shift); if(g) tg[g].push(m); });
    const lbl={early:'Early Shift',mid:'Mid Shift',late:'Late / Afternoon',overnight:'Overnight'};
    const dc={early:'live',mid:'later',late:'upcoming',overnight:'done'};
    let any=false;
    for(const [g,ms] of Object.entries(tg)){
      if(!ms.length) continue; any=true;
      html+=`<div class="shift-group ${g}"><div class="shift-group-label">${lbl[g]} (${ms.length})</div>`;
      ms.forEach(m=>{ html+=chip(m,dc[g]); }); html+='</div>';
    }
    if(!any) html='<div class="no-active" style="grid-column:1/-1">No scheduled shifts &#127881;</div>';
  }
  document.getElementById('active-members-grid').innerHTML=html;
}

function navDay(dir){
  isAutoTracking=false;
  selectedDay=Math.max(0,Math.min(35,selectedDay+dir));
  renderDashboard();
  document.querySelectorAll('.date-hdr').forEach((th,i)=>{
    th.style.outline=i===selectedDay?'2px solid #f5a623':'';
  });
}

/* ═══════════════ EVENTS ═══════════════ */
function renderUpcomingEvents(){
  const upcoming=EVENTS_DATA.filter(e=>e.idx>=TODAY).slice(0,20);
  let html='';
  upcoming.forEach(ev=>{
    const dt=DATES[ev.idx];
    const isT=ev.idx===TODAY;
    const logoRow=`<div class="ev-logo-wrap">${ev.logos.join('')}</div>`;
    const gameLines=ev.games.map(g=>{
      return `<div class="matchup-line">${g.matchup}${g.ifNec?` <span class="ifnec-tag">if necessary</span>`:''}</div>`;
    }).join('');
    html+=`<div class="event-card${isT?' today-card':''}" onclick="isAutoTracking=${ev.idx===findTodayIndex()};selectedDay=${ev.idx};renderDashboard()">
      <div class="event-date-badge"><div class="eday">${dt.dy}</div><div class="edate">${dt.d}</div></div>
      <div class="event-info">${logoRow}<div class="event-name">${ev.title}</div>${gameLines}</div>
    </div>`;
  });
  document.getElementById('upcoming-cards').innerHTML=html||'<div style="color:rgba(255,255,255,.4);padding:12px;font-size:12px">No upcoming events</div>';
}

/* ═══════════════ TABLE ═══════════════ */
const WEEKS=[
  {label:'Jun 28',       span:1, start:0,  current:false},
  {label:'Jun 29 - Jul 5',span:7,start:1,  current:false},
  {label:'Jul 6-12',     span:7, start:8,  current:false},
  {label:'Jul 13-19',    span:7, start:15, current:true},
  {label:'Jul 20-26',    span:7, start:22, current:false},
  {label:'Jul 27-Aug 2', span:7, start:29, current:false},
];

function renderTable(){
  const table=document.getElementById('sched');
  let h='<thead><tr>';
  h+=`<th class="col-name week-hdr" style="font-size:9px;letter-spacing:.5px;color:rgba(255,255,255,.35)">MERCH OPS</th>`;
  h+=`<th class="col-tz week-hdr" style="font-size:9px;color:rgba(255,255,255,.3)">TZ</th>`;
  WEEKS.forEach(w=>{
    h+=`<th colspan="${w.span}" class="week-hdr${w.current?' current-week':''}">${w.label}</th>`;
  });
  h+='</tr><tr>';
  h+=`<th class="col-name" style="background:var(--navy);padding:0 12px;font-size:11px;color:rgba(255,255,255,.45);font-weight:600;letter-spacing:.4px">NAME</th>`;
  h+=`<th class="col-tz" style="background:var(--navy2);font-size:9.5px;color:rgba(255,255,255,.35);letter-spacing:.3px">TZ</th>`;
  DATES.forEach((dt,i)=>{
    const isT=i===TODAY;
    const isWk=dt.dy==='Sun'||dt.dy==='Sat';
    const wkStart=WEEKS.some(w=>w.start===i&&i>0);
    const hasN=!!gn('date',i,'');
    h+=`<th class="date-hdr${isT?' today':isWk?' weekend':''}${wkStart?' week-start':''}${hasN?' has-note':''}" onclick="openDateNote(${i})" id="dh${i}">
      <span class="dname">${dt.dy}</span><span class="dnum">${dt.d}</span>
    </th>`;
  });
  h+='</tr></thead><tbody>';
  h+=sectionRow('SBK');
  G1.forEach(e=>{ h+=empRow(e,1); });
  h+=sectionRow('FlyWheelOps');
  G2.forEach(e=>{ h+=empRow(e,2); });
  h+=sectionRow('Racing Ops');
  G3.forEach(e=>{ h+=empRow(e,3); });
  h+=eventsRow('&#127942; Events','ev-events',EVENTS_FLAT);
  h+=eventsRow('&#128203; Notes','ev-notes',NOTES_ROW);
  h+=eventsRow('&#128681; Coverage','ev-flags',COVERAGE);
  h+=teamNotesRow();
  h+='</tbody>';
  table.innerHTML=h;
}

function sectionRow(label){
  let h=`<tr class="section-row"><td class="col-name">${label}</td><td class="col-tz"></td>`;
  DATES.forEach((_,i)=>{
    const wkStart=WEEKS.some(w=>w.start===i&&i>0);
    h+=`<td style="background:var(--surface);border-bottom:1px solid var(--border)${wkStart?';border-left:2px solid #c0cfe8':''};padding:0"></td>`;
  });
  return h+'</tr>';
}

function empRow(e,g){
  const isHidden=!visibleNames.has(e.n)||(g===1&&!showG1)||(g===2&&!showG2)||(g===3&&!showG3);
  const isPred=PREDICTS.includes(e.n);
  const isKy=e.n==='Ky Coony';
  let h=`<tr class="emp-row${isHidden?' hidden-row':''}${isPred?' predicts-row':''}" data-name="${e.n}" data-group="${g}">`;
  const nameBg=isPred?'background:#0d5c2e':'background:var(--navy)';
  const nameFg=isPred?'color:#a0f0c0':isKy?'color:#f5a623':'color:#e8ecf4';
  const tzBg=isPred?'background:#0a4a28':'background:var(--navy2)';
  const empTitle=TITLES[e.n]||'';
  h+=`<td class="col-name emp-name-cell" style="${nameBg};${nameFg};font-size:12.5px;font-weight:600">
    <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.n}</div>
    ${empTitle?`<div class="emp-title">${empTitle}</div>`:''}
  </td>`;
  h+=`<td class="col-tz" style="${tzBg}">${e.tz}</td>`;
  DATES.forEach((dt,i)=>{
    const shift=(e.s[i]||'').trim();
    const cls=shiftClass(e.n,shift);
    const isT=i===TODAY;
    const wkStart=WEEKS.some(w=>w.start===i&&i>0);
    const note=gn('cell',i,e.n);
    // For G3, abbreviate the display text to avoid overflow
    let disp=cls==='s-off'?'&#8212;':cls==='s-blank'?(isT?'OFF':''):shift;
    let cellContent=disp;
    if(g===3 && cls!=='s-off' && cls!=='s-blank' && shift){
      cellContent=abbrevShift(shift);
    }
    // Specials star logic
    let isSpecials=false,specialsLabel='';
    if(g===2&&shift==='2 PM - 10 PM'){ isSpecials=true; specialsLabel=`Late ${STAR}`; }
    const earlyDates=EARLY_SPECIALS_DATES[e.n];
    if(earlyDates&&earlyDates.has(i)&&(shift==='9 AM - 5 PM'||shift==='9AM - 5PM')){ isSpecials=true; specialsLabel=`Early ${STAR}`; }
    if(isSpecials) cellContent=`<span class="sc-time">${shift}</span><span class="sc-spec">${specialsLabel}</span>`;

    h+=`<td class="sc ${cls}${g===3?' g3':''}${isSpecials?' sc-specials':''}${isT?' today':''}${wkStart?' week-start':''}"
      onclick="openCellNote(${i},'${e.n.replace(/'/g,"\\'")}')"
      title="${note?'&#128221; '+note:shift||''}"
    ><div class="sv">${cellContent}${note?'<span class="note-dot"></span>':''}</div></td>`;
  });
  return h+'</tr>';
}

function eventsRow(label,cls,data){
  let h=`<tr class="events-row"><td class="col-name events-label" style="background:var(--navy)">${label}</td><td class="col-tz" style="background:var(--navy2)"></td>`;
  data.forEach((v,i)=>{
    const isT=i===TODAY;
    const wkStart=WEEKS.some(w=>w.start===i&&i>0);
    h+=`<td class="${cls}${isT?' today':''}${wkStart?' week-start':''}">${v||''}</td>`;
  });
  return h+'</tr>';
}

function teamNotesRow(){
  let h=`<tr class="events-row"><td class="col-name" style="background:#0d5c2e;color:#a0f0c0;font-size:10px;font-weight:700">&#9999; Team Notes</td><td class="col-tz" style="background:#0a4a28;color:#a0f0c0;font-size:9px">click &rarr;</td>`;
  DATES.forEach((_,i)=>{
    const note=gn('team',i,'');
    const isT=i===TODAY;
    const wkStart=WEEKS.some(w=>w.start===i&&i>0);
    h+=`<td class="ev-team${note?' has-note':' empty-note'}${isT?' today':''}${wkStart?' week-start':''}" onclick="openTeamNote(${i})">${note||'+'}</td>`;
  });
  return h+'</tr>';
}

/* ═══════════════ FILTER ═══════════════ */
function buildDropdown(){
  const list=document.getElementById('dropdown-list');
  let h='';
  [{label:'SBK',emps:G1},{label:'FlyWheelOps',emps:G2},{label:'Racing Ops',emps:G3}].forEach(({label,emps})=>{
    h+=`<div class="dropdown-group-label">${label}</div>`;
    emps.forEach(e=>{
      h+=`<div class="dropdown-item" id="di-${e.n.replace(/ /g,'_')}">
        <input type="checkbox" id="cb-${e.n.replace(/ /g,'_')}" ${visibleNames.has(e.n)?'checked':''} onchange="toggleName('${e.n.replace(/'/g,"\\'")}',this.checked)">
        <label for="cb-${e.n.replace(/ /g,'_')}">${e.n}</label>
        <span class="dtz">${e.tz}</span>
      </div>`;
    });
  });
  list.innerHTML=h; updateFilterBtn();
}
function toggleName(name,checked){
  if(checked) visibleNames.add(name); else visibleNames.delete(name);
  applyFilter(); updateFilterBtn();
}
function selectAllNames(){ ALL_EMP.forEach(e=>visibleNames.add(e.n)); document.querySelectorAll('#dropdown-list input').forEach(c=>c.checked=true); applyFilter(); updateFilterBtn(); }
function selectNoneNames(){ visibleNames.clear(); document.querySelectorAll('#dropdown-list input').forEach(c=>c.checked=false); applyFilter(); updateFilterBtn(); }
function selectGroup(g){ const emps=g===1?G1:g===2?G2:G3; emps.forEach(e=>{ visibleNames.add(e.n); const c=document.getElementById('cb-'+e.n.replace(/ /g,'_')); if(c) c.checked=true; }); applyFilter(); updateFilterBtn(); }
function applyFilter(){
  document.querySelectorAll('.emp-row').forEach(row=>{
    const name=row.dataset.name, g=parseInt(row.dataset.group);
    row.classList.toggle('hidden-row',!visibleNames.has(name)||(g===1&&!showG1)||(g===2&&!showG2)||(g===3&&!showG3));
  });
}
function updateFilterBtn(){
  const hidden=ALL_EMP.length-visibleNames.size;
  document.getElementById('hidden-count-label').textContent=hidden>0?`(${hidden} hidden)`:'';
  document.getElementById('name-filter-btn').classList.toggle('active',hidden>0);
}
function toggleNameDropdown(){ document.getElementById('name-dropdown').classList.toggle('open'); }
function filterDropdownList(){
  const q=document.getElementById('name-search').value.toLowerCase();
  document.querySelectorAll('.dropdown-item').forEach(el=>{ el.style.display=el.textContent.toLowerCase().includes(q)?'':'none'; });
}
function searchName(q){
  q=q.toLowerCase().trim();
  if(!q){ ALL_EMP.forEach(e=>visibleNames.add(e.n)); applyFilter(); updateFilterBtn(); return; }
  visibleNames.clear(); ALL_EMP.forEach(e=>{ if(e.n.toLowerCase().includes(q)) visibleNames.add(e.n); }); applyFilter(); updateFilterBtn();
}
function toggleGroup(g){
  if(g===1){ showG1=!showG1; document.getElementById('btn-g1').classList.toggle('active',showG1); }
  else if(g===2){ showG2=!showG2; document.getElementById('btn-g2').classList.toggle('active',showG2); }
  else{ showG3=!showG3; document.getElementById('btn-g3').classList.toggle('active',showG3); }
  applyFilter();
}
document.addEventListener('click',e=>{ const w=document.getElementById('name-dropdown-wrap'); if(!w.contains(e.target)) document.getElementById('name-dropdown').classList.remove('open'); });

/* ═══════════════ MODAL ═══════════════ */
let mState={};
function openCellNote(i,name){ mState={t:'cell',i,n:name}; openModal(name,`${DATES[i].dy} ${DATES[i].d}`); }
function openDateNote(i){ mState={t:'date',i,n:''}; openModal(`Date Note &mdash; ${DATES[i].d}`,`${DATES[i].dy}, ${DATES[i].d}`); }
function openTeamNote(i){ mState={t:'team',i,n:''}; openModal('Team Note',`${DATES[i].dy} ${DATES[i].d}`); }
function openModal(title,sub){
  document.getElementById('m-title').innerHTML=title;
  document.getElementById('m-sub').textContent=sub;
  document.getElementById('m-input').value=gn(mState.t,mState.i,mState.n);
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-input').focus(),60);
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function saveNote(){ sn(mState.t,mState.i,mState.n,document.getElementById('m-input').value); renderTable(); applyFilter(); closeModal(); }
function clearNote(){ sn(mState.t,mState.i,mState.n,''); renderTable(); applyFilter(); closeModal(); }
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ═══════════════ TODAY / CLOCK ═══════════════ */
function jumpToToday(){
  isAutoTracking=true;
  selectedDay=findTodayIndex();
  renderDashboard();
  const wrap=document.getElementById('table-wrap');
  const hdr=document.getElementById('dh'+selectedDay);
  if(hdr){ const r=hdr.getBoundingClientRect(), wr=wrap.getBoundingClientRect(); wrap.scrollLeft+=r.left-wr.left-250; }
}
function updateClock(){
  const now=new Date();
  document.getElementById('live-clock').textContent=now.toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  if(isAutoTracking){
    const li=findTodayIndex();
    if(li!==selectedDay){ selectedDay=li; renderDashboard(); }
    else { renderDashboard(); } // refresh live status every 30s
  }
}

/* ═══════════════ INIT ═══════════════ */
renderTable(); buildDropdown(); renderDashboard(); renderUpcomingEvents(); updateClock();
setInterval(updateClock,30000);
setTimeout(()=>{
  jumpToToday();
  document.querySelectorAll('.date-hdr').forEach((th,i)=>{
    th.style.outline=i===selectedDay?'2px solid var(--gold)':'';
  });
},120);
</script>
